name: Deploy to VPS (notes.yaqlab.com)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build site for production domain
        env:
          SITE_URL: https://notes.yaqlab.com
          BASE_PATH: /
        run: npm run build

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ secrets.VPS_PORT || 22 }}" "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync dist to VPS
        run: |
          rsync -az --delete -e "ssh -p ${{ secrets.VPS_PORT || 22 }}" dist/ "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/notes.yaqlab.com/"
