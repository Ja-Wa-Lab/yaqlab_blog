name: Deploy to VPS (notes.yaqlab.com)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_PORT: ${{ secrets.VPS_PORT }}
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build site for production domain
        env:
          SITE_URL: https://notes.yaqlab.com
          BASE_PATH: /
        run: npm run build

      - name: Validate required secrets
        run: |
          set -e
          if [ -z "$VPS_HOST" ]; then
            echo "Missing secret: VPS_HOST"
            exit 1
          fi
          if [ -z "$VPS_USER" ]; then
            echo "Missing secret: VPS_USER"
            exit 1
          fi
          if [ -z "$VPS_SSH_KEY" ]; then
            echo "Missing secret: VPS_SSH_KEY"
            exit 1
          fi
          if [ -z "$VPS_PORT" ]; then
            VPS_PORT=22
            echo "VPS_PORT not set; defaulting to 22"
          fi
          if ! [[ "$VPS_PORT" =~ ^[0-9]+$ ]]; then
            echo "Invalid VPS_PORT: '$VPS_PORT' (must be numeric)"
            exit 1
          fi
          echo "Using VPS_HOST=$VPS_HOST VPS_USER=$VPS_USER VPS_PORT=$VPS_PORT"

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "$VPS_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -4 -p "$VPS_PORT" "$VPS_HOST" >> ~/.ssh/known_hosts || ssh-keyscan -6 -p "$VPS_PORT" "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Sync dist to VPS
        run: |
          rsync -az --delete -e "ssh -p $VPS_PORT" dist/ "$VPS_USER@$VPS_HOST:/var/www/notes.yaqlab.com/"
